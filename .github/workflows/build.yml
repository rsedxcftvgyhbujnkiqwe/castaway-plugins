name: build

on:
  push:
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    name: Build (SM ${{ matrix.sm-target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # TODO: Re-enable SM 1.13 builds when Address gets fixed
        # sm-target: ["1.12", "1.13"]
        sm-target: ["1.12"]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup SourceMod
        run: |
          wget -O sourcemod.tar.gz "https://www.sourcemod.net/latest.php?os=linux&version=${{ matrix.sm-target }}"
          mkdir sourcemod
          cd sourcemod
          tar xf ../sourcemod.tar.gz
          cd addons/sourcemod/scripting
          mv compile.sh ../../../../scripting
          mv spcomp* ../../../../scripting
          mv include/*.inc ../../../../scripting/include

      - name: Get current Git commit hash
        run: echo "GIT_COMMIT=-$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_ENV

      - name: Preprocess reverts.sp
        run: ./reverts-git-commit.sh

      - name: Make Windows and Patchless reverts variants
        run: |
          cd scripting
          cp reverts.sp reverts-patchless.sp
          cp reverts.sp reverts-linux.sp
          cp reverts.sp reverts-win32.sp
          sed -i "1i#define NO_MEMPATCHES" reverts-patchless.sp
          sed -i "1i#define WIN32" reverts-win32.sp

      - name: Build plugins
        run: |
          cd scripting
          ./compile.sh reverts-*.sp

      - name: Package plugins
        run: |
          for arch in "linux" "win32" "patchless"; do
            FOLDER_NAME="reverts-${arch}_sm-${{ matrix.sm-target }}"
            mkdir -p ${FOLDER_NAME}/plugins
            mkdir ${FOLDER_NAME}/gamedata
            mkdir ${FOLDER_NAME}/translations
            mv scripting/compiled/reverts-${arch}.smx ${FOLDER_NAME}/plugins/
            cp gamedata/*reverts*.txt ${FOLDER_NAME}/gamedata/
            find translations/ -name "reverts.phrases.txt" -exec cp --parents {} ${FOLDER_NAME}/ \;
            zip -r "${FOLDER_NAME}.zip" "${FOLDER_NAME}"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: reverts-*_sm-${{ matrix.sm-target }}.zip
